services:
  postgres:
    image: postgres:16-alpine
    container_name: loklflow_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-loklflow}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-loklflow}
      POSTGRES_DB: ${DATABASE_NAME:-loklflow_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-loklflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loklflow_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
